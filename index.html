<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Anniversary ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔊 MUSIC BUTTON -->
<button id="musicToggle" onclick="toggleMusic()">🔇</button>

<!-- ❤️ HEARTS -->
<div id="hearts-container"></div>

<!-- 💌 INTRO -->
<div class="intro" id="intro">
  <div class="card center">
    <h1>I made something for you ❤️</h1>
    <button onclick="openLetter()">Open Your Letter 💌</button>
  </div>
</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
  <source src="love.mp3" type="audio/mpeg">
</audio>

<!-- 💖 MAIN -->
<div id="mainContent" class="hidden">

<section class="section center" id="heroSection">
  <div class="hero-stack">

    <div class="card hidden" id="dateBox">
      <h2>It’s 24th April 🎉</h2>
      <p>haan yaad hai mujhe 😉</p>
    </div>

    <div class="card hidden" id="annivBox">
      <h1>Happy 1st Anniversary ❤️</h1>
      <p>For My Love 💕</p>
    </div>

    <button id="nextBtn" class="hidden" onclick="goToLetter()">Continue ❤️</button>

  </div>
</section>

<section class="section center hidden" id="letterSection">
  <div class="notebook">
    <div id="letter"></div>
    <button id="letterBtn" class="hidden" onclick="goToFinal()">One more ❤️</button>
  </div>
</section>

<section class="section center hidden" id="finalSection">
  <div class="card">

    <h1 id="proposalText" class="hidden">Would you marry me? 💍</h1>

    <div id="buttons" class="hidden">
      <button onclick="yesClicked()">Yes ❤️</button>
      <button id="noBtn">No 😢</button>
    </div>

    <h2 id="finalLove" class="hidden">I love you 10 million times and more ❤️</h2>

  </div>
</section>

</div>

<!-- ❤️ FOOTER -->
<footer class="footer">
  Made with ❤️ by Sufyaan aka MrGlitch
</footer>

<script src="script.js"></script>
</body>
</html>
